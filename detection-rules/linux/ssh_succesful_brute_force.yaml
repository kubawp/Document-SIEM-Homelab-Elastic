name: "SUCCESSFUL Brute-force SSH Linux"

type: cardinality

index: elastalert*

cardinality_field: rule_name
max_cardinality: 1

filter:
- terms:
    rule_name:
      - "Successful SSH Login Linux"
      - "Brute-force SSH Linux"

- term:
    alert_sent: true

timeframe:
  minutes: 3

alert:
- command

command: "echo SSH BRUTEFORCE SUCCESS LINUX"
