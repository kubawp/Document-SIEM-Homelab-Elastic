name: "SUCCESSFUL Brute-force SSH Windows"

type: cardinality

index: elastalert*

cardinality_field: rule_name
max_cardinality: 1

filter:
- terms:
    rule_name:
      - "Successful SSH Login Windows"
      - "Brute-force SSH Windows"

- term:
    alert_sent: true

timeframe:
  minutes: 5

alert:
- command

command: "echo SSH BRUTEFORCE SUCCESS WINDOWS"
