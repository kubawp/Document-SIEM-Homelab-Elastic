name: "SUCCESSFUL Brute-force RDP Windows"

type: cardinality

index: elastalert*

cardinality_field: rule_name
max_cardinality: 1

filter:
- terms:
    rule_name:
      - "Successful RDP Login Windows"
      - "Brute-force RDP Windows"

- term:
    alert_sent: true

timeframe:
  minutes: 5

alert:
- command

command: "echo RDP BRUTEFORCE SUCCESS WINDOWS"
